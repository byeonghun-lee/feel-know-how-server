service: feel-know-how-server
# frameworkVersion: "2.1.0"
provider:
    name: aws
    runtime: nodejs14.x
    stage: prod
    region: ap-northeast-2
plugins:
    - serverless-webpack
    # - serverless-offline

build:
  esbuild: false

custom:
    webpack:
        webpackConfig: "webpack.config.js"
        includeModules: true
        packager: "npm"

functions:
    app:
        handler: src/app.handler
        events:
            - http:
                path: /
                method: ANY
                # cors:
                #     origin: "https://www.ohmydrawer.com"
                #     allowCredentials: true
                # cors: true
            - http:
                path: "{proxy+}"
                method: ANY
                # cors:
                #     origin: "https://www.ohmydrawer.com"
                #     allowCredentials: true
                # cors: true
            
package:
    individually: true
    include:
        - node_modules/**
